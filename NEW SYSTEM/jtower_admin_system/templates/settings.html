{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block breadcrumb %}Settings / Change Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">

<div class="card" style="max-width: 600px;">
  <div class="card-header">
    <div class="card-title">🔑 Change Your Password</div>
  </div>
  <div class="card-body">
    <form id="passwordForm" method="POST" action="{{ url_for('change_password') }}">
      <div class="form-group">
        <label for="current_password" class="form-label">Current Password</label>
        <input type="password" id="current_password" name="current_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="new_password" class="form-label">New Password</label>
        <input type="password" id="new_password" name="new_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        <div id="password-match-error" class="error-text" style="display: none;">Passwords do not match.</div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-gold">💾 Update Password</button>
      </div>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
